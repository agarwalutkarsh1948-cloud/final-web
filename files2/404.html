<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1a1a2e}
    .wrap{text-align:center;padding:40px 20px}
    .code{font-size:120px;font-weight:800;color:#e0217a;line-height:1}
    h1{font-size:24px;margin:16px 0 8px}
    p{color:#888;font-size:15px;margin-bottom:28px}
    a{display:inline-block;background:#e0217a;color:#fff;text-decoration:none;padding:12px 28px;border-radius:10px;font-weight:600;font-size:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
